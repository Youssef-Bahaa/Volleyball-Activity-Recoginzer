<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volleyball detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f0f0f; color: #fff; padding: 1.5rem; }

    h1 { font-size: 1.1rem; font-weight: 500; margin-bottom: 1.25rem; color: #ccc; }

    #upload-zone {
      border: 2px dashed #444; border-radius: 12px;
      padding: 3rem 2rem; text-align: center; cursor: pointer;
      transition: border-color .2s;
    }
    #upload-zone:hover { border-color: #888; }
    #upload-zone p { color: #888; font-size: 0.9rem; margin-top: .5rem; }

    #player-wrap { display: none; }

    .video-container {
      position: relative;
      display: inline-block;
      width: 100%;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
    }

    video {
      display: block;
      width: 100%;
    }

    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #status-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-top: 10px; align-items: center;
    }
    .badge {
      font-size: 12px; padding: 3px 10px; border-radius: 6px;
      font-weight: 500;
    }
    .badge-blue   { background: #1d4ed8; }
    .badge-green  { background: #15803d; }
    .badge-yellow { background: #a16207; }
    .badge-gray   { background: #374151; }

    #timeline { margin-top: 1.5rem; display: none; }
    #timeline h2 { font-size: 0.85rem; color: #888; margin-bottom: .5rem; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 6px 8px; color: #888; border-bottom: 1px solid #333; }
    td { padding: 6px 8px; border-bottom: 1px solid #1f1f1f; }
    tr:hover td { background: #1a1a1a; }

    #loading { display: none; text-align: center; padding: 2rem; color: #888; }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto 1rem;
      border: 3px solid #333; border-top-color: #fff;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>Volleyball activity recognizer</h1>

<div id="upload-zone" onclick="document.getElementById('file-input').click()">
  <svg width="40" height="40" fill="none" stroke="#666" stroke-width="1.5"
       viewBox="0 0 24 24" style="margin:0 auto">
    <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 12V4M8 8l4-4 4 4"/>
  </svg>
  <p>Click to upload a video (.mp4 .avi .mov .mkv)</p>
  <input type="file" id="file-input" accept="video/*" style="display:none" />
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>Analyzing video…</p>
</div>

<div id="player-wrap">
  <div class="video-container">
    <video id="vid" controls playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="status-bar">
    <span class="badge badge-blue"  id="b-frame">Frame —</span>
    <span class="badge badge-green" id="b-label">—</span>
    <span class="badge badge-yellow" id="b-conf">conf —</span>
    <span class="badge badge-gray"  id="b-persons">0 players</span>
  </div>
</div>

<div id="timeline">
  <h2>Timeline</h2>
  <table>
    <thead><tr><th>Start</th><th>End</th><th>Label</th><th>Confidence</th></tr></thead>
    <tbody id="timeline-body"></tbody>
  </table>
</div>

<script>
  const API = 'http://localhost:8000';

  const vid  = document.getElementById('vid');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');

  let frameData = [];
  let effectiveFps = 30;

  // ── file upload ────────────────────────────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;

    vid.src = URL.createObjectURL(file);
    document.getElementById('upload-zone').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    try {
      const form = new FormData();
      form.append('file', file);
      const res = await fetch(`${API}/predict`, { method: 'POST', body: form });
      const json = await res.json();

      if (json.error) { alert(json.error); return; }

      frameData = json.frames ?? [];
      effectiveFps = json.effective_fps ?? 10;

      buildTimeline(json.timeline ?? []);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('player-wrap').style.display = 'block';
      document.getElementById('timeline').style.display = 'block';

    } catch (err) {
      alert('Request failed: ' + err.message);
      document.getElementById('loading').style.display = 'none';
    }
  });

  function syncCanvas() {
    canvas.width  = vid.videoWidth || 640;
    canvas.height = vid.videoHeight || 360;
  }
  vid.addEventListener('loadedmetadata', syncCanvas);
  window.addEventListener('resize', () => {
    // re-sync on resize so scaling is correct
    syncCanvas();
  });

  function drawFrame(data) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!data) return;

    const detections  = data.detections  ?? [];
    const persons = data.persons ?? [];
    const groupLabel = data.group_label;
    const groupConf = data.group_conf;


    const actionMap = {};
    persons.forEach(p => { actionMap[p.player_id] = p; });

    detections.forEach((det, i) => {
      const [x1, y1, x2, y2] = det.box;
      const isPerson = det.label === 'person';
      const color    = isPerson ? '#22c55e' : '#f59e0b';

      // bounding box
      ctx.strokeStyle = color;
      ctx.lineWidth   = 2;
      ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);


      const personInfo = actionMap[i];
      let tag = isPerson
        ? `P${i}` +
          (personInfo?.action_label ? `  ${personInfo.action_label}` : '') +
          `  ${(det.confidence * 100).toFixed(0)}%`
        : `${det.label}  ${(det.confidence * 100).toFixed(0)}%`;

      ctx.font = 'bold 12px sans-serif';
      const tw = ctx.measureText(tag).width + 8;


      ctx.fillStyle = color;
      ctx.fillRect(x1, y1 - 20, tw, 20);


      ctx.fillStyle = '#fff';
      ctx.fillText(tag, x1 + 4, y1 - 5);
    });


    if (groupLabel) {
      const text = `${groupLabel}  (${(groupConf * 100).toFixed(1)}%)`;
      ctx.font = 'bold 14px sans-serif';
      const tw = ctx.measureText(text).width + 16;
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(8, 8, tw, 34);
      ctx.fillStyle = '#fff';
      ctx.fillText(text, 16, 30);
    }


    document.getElementById('b-frame').textContent   = `Frame ${data.frame_idx}`;
    document.getElementById('b-label').textContent   = groupLabel ?? '—';
    document.getElementById('b-conf').textContent    = groupConf
      ? `conf ${(groupConf * 100).toFixed(1)}%` : 'conf —';
    document.getElementById('b-persons').textContent =
      `${detections.filter(d => d.label === 'person').length} players`;
  }


  vid.addEventListener('timeupdate', () => {
    const frameIdx = Math.floor(vid.currentTime * effectiveFps);
    drawFrame(frameData[frameIdx]);
  });


  function buildTimeline(timeline) {
    const tbody = document.getElementById('timeline-body');
    tbody.innerHTML = '';
    timeline.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${row.start}</td>
        <td>${row.end}</td>
        <td>${row.label}</td>
        <td>${(row.confidence * 100).toFixed(1)}%</td>
      `;
      // clicking a row seeks the video to that timestamp
      tr.style.cursor = 'pointer';
      tr.addEventListener('click', () => { vid.currentTime = row.start_sec; });
      tbody.appendChild(tr);
    });
  }
</script>
</body>
</html>

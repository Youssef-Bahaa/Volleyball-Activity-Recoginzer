<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volleyball Activity Recognizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0e10;
    --surface:   #18181b;
    --surface2:  #222227;
    --border:    #2e2e34;
    --text:      #f0f0f2;
    --muted:     #8b8b99;
    --accent:    #4f7cff;
    --accent-bg: #1a2340;
    --success:   #22c55e;
    --font:      system-ui, -apple-system, sans-serif;
    --mono:      'JetBrains Mono', 'Fira Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header p {
    margin-top: 0.4rem;
    font-size: 0.875rem;
    color: var(--muted);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    width: 100%;
    max-width: 640px;
    margin-bottom: 1rem;
  }

  /* ── Drop zone ── */
  #drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 2.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  #drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-bg);
  }

  #drop-zone .icon {
    font-size: 2rem;
    margin-bottom: 0.75rem;
    display: block;
    color: var(--muted);
  }

  #drop-zone p {
    font-size: 0.875rem;
    color: var(--muted);
  }

  #drop-zone strong {
    color: var(--accent);
    font-weight: 500;
  }

  #file-input { display: none; }

  #file-name {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: var(--muted);
    font-family: var(--mono);
    min-height: 1.2rem;
  }

  /* ── Video preview ── */
  #video-wrap {
    display: none;
    margin-top: 1rem;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
  }

  #preview {
    width: 100%;
    max-height: 280px;
    display: block;
    object-fit: contain;
  }

  /* ── Submit button ── */
  #submit-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.75rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  #submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  #submit-btn:not(:disabled):hover { opacity: 0.88; }

  /* ── Spinner ── */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results ── */
  #results { display: none; }

  .result-label {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }

  .result-label .activity {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    text-transform: uppercase;
    font-family: var(--mono);
  }

  .result-label .conf-badge {
    font-size: 0.8rem;
    font-weight: 500;
    background: var(--accent-bg);
    color: var(--accent);
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    border: 1px solid rgba(79,124,255,0.25);
  }

  .section-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  /* ── Bar chart ── */
  .bar-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .bar-row {
    display: grid;
    grid-template-columns: 90px 1fr 44px;
    align-items: center;
    gap: 0.6rem;
  }

  .bar-row .label {
    font-size: 0.78rem;
    font-family: var(--mono);
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-row .track {
    height: 6px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-row .fill {
    height: 100%;
    border-radius: 4px;
    background: var(--accent);
    transition: width 0.55s cubic-bezier(.22,.68,0,1.2);
    width: 0%;
  }

  .bar-row .fill.top { background: var(--success); }

  .bar-row .pct {
    font-size: 0.75rem;
    font-family: var(--mono);
    color: var(--muted);
    text-align: right;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.25rem 0;
  }

  /* ── Error ── */
  #error-msg {
    display: none;
    margin-top: 0.75rem;
    padding: 0.75rem 1rem;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 8px;
    font-size: 0.85rem;
    color: #f87171;
  }

  /* ── Footer ── */
  footer {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Volleyball Activity Recognizer</h1>
  <p>Upload a clip — B8 model predicts the group activity</p>
</header>

<div class="card">
  <div id="drop-zone">
    <span class="icon">⬆</span>
    <p>Drop a video here or <strong>click to browse</strong></p>
    <p style="margin-top:0.3rem; font-size:0.75rem;">MP4 · AVI · MOV · MKV</p>
  </div>
  <input type="file" id="file-input" accept=".mp4,.avi,.mov,.mkv">

  <div id="file-name"></div>

  <div id="video-wrap">
    <video id="preview" controls muted playsinline></video>
  </div>

  <div id="error-msg"></div>

  <button id="submit-btn" disabled>
    <span class="spinner" id="spinner"></span>
    <span id="btn-text">Analyse clip</span>
  </button>
</div>

<div class="card" id="results">
  <div class="result-label">
    <span class="activity" id="res-label">—</span>
    <span class="conf-badge" id="res-conf">—</span>
  </div>

  <div class="divider"></div>

  <p class="section-label">Class probabilities</p>
  <div class="bar-list" id="bar-list"></div>
</div>

<footer>B8 ResNet50 + LSTM · YOLO player detection · Volleyball dataset</footer>

<script>
const API = 'http://localhost:8000';

const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const fileName   = document.getElementById('file-name');
const videoWrap  = document.getElementById('video-wrap');
const preview    = document.getElementById('preview');
const submitBtn  = document.getElementById('submit-btn');
const btnText    = document.getElementById('btn-text');
const spinner    = document.getElementById('spinner');
const errorMsg   = document.getElementById('error-msg');
const results    = document.getElementById('results');
const resLabel   = document.getElementById('res-label');
const resConf    = document.getElementById('res-conf');
const barList    = document.getElementById('bar-list');

let selectedFile = null;

const LABELS = ['l-pass','r-pass','l-spike','r-spike','l-set','r-set','l-winpoint','r-winpoint'];

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
}

function clearError() {
  errorMsg.style.display = 'none';
}

function setLoading(on) {
  submitBtn.disabled = on || !selectedFile;
  spinner.style.display = on ? 'block' : 'none';
  btnText.textContent = on ? 'Analysing…' : 'Analyse clip';
}

function loadFile(file) {
  if (!file) return;
  const allowed = ['video/mp4','video/avi','video/quicktime','video/x-msvideo','video/x-matroska'];
  if (!allowed.some(t => file.type.startsWith('video')) && !file.name.match(/\.(mp4|avi|mov|mkv)$/i)) {
    showError('Unsupported file type. Use MP4, AVI, MOV, or MKV.');
    return;
  }
  clearError();
  selectedFile = file;
  fileName.textContent = file.name;

  const url = URL.createObjectURL(file);
  preview.src = url;
  videoWrap.style.display = 'block';
  results.style.display = 'none';
  submitBtn.disabled = false;
}

dropZone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function buildBars(probs, topLabel) {
  barList.innerHTML = '';
  const sorted = Object.entries(probs).sort((a,b) => b[1] - a[1]);
  sorted.forEach(([label, prob]) => {
    const pct = (prob * 100).toFixed(1);
    const isTop = label === topLabel;
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <span class="label">${label}</span>
      <div class="track"><div class="fill${isTop ? ' top' : ''}" data-pct="${prob * 100}"></div></div>
      <span class="pct">${pct}%</span>`;
    barList.appendChild(row);
  });
  requestAnimationFrame(() => {
    document.querySelectorAll('.fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });
}

submitBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  clearError();
  setLoading(true);
  results.style.display = 'none';

  const form = new FormData();
  form.append('file', selectedFile);

  try {
    const res = await fetch(`${API}/predict`, { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
      throw new Error(err.detail || `Server error ${res.status}`);
    }
    const data = await res.json();

    resLabel.textContent = data.label;
    resConf.textContent  = (data.confidence * 100).toFixed(1) + '% confidence';
    buildBars(data.probabilities, data.label);
    results.style.display = 'block';

  } catch (e) {
    showError(e.message || 'Could not reach the API. Is the server running?');
  } finally {
    setLoading(false);
  }
});
</script>
</body>
</html>
